# ==============================================================================
# AUTOSTART
# ==============================================================================

# Note: When using UWSM, most services should be started via systemd user services.
# However, basic visual elements can be started here using 'uwsm app --'

# Start authentication agent (GNOME Polkit)
exec-once = uwsm app -- /usr/libexec/polkit-gnome-authentication-agent-1

# Start core desktop components
exec-once = uwsm app -- waybar
exec-once = uwsm app -- swaync
exec-once = uwsm app -- hypridle
exec-once = uwsm app -- nm-applet --indicator

# Start wallpaper daemon and set default wallpaper
exec-once = uwsm app -- swww-daemon
exec-once = uwsm app -- swww img ~/.config/assets/wallpapers/default.jpg --transition-type wipe

# Start clipboard manager
exec-once = uwsm app -- wl-paste --type text --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store
