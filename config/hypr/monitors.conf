# ==============================================================================
# MONITORS
# ==============================================================================

# Default fallback (auto detect resolution, max refresh rate, position auto, scale 1)
monitor=,preferred,auto,1

# Example specific monitor configurations (uncomment and adjust as needed)
# monitor=DP-1, 2560x1440@144, 0x0, 1
# monitor=eDP-1, 1920x1080@60, 2560x0, 1

# Fractional Scaling note:
# If you use fractional scaling (e.g., 1.5), ensure xwayland apps don't get blurry:
# xwayland { force_zero_scaling = true } is already set in hyprland.conf
