# ==============================================================================
# APPEARANCE, THEME, AND ANIMATIONS
# ==============================================================================

source = ~/.config/themes/catppuccin/colors.conf

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    col.active_border = $border_active
    col.inactive_border = $border_inactive

    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 10
    
    blur {
        enabled = true
        size = 3
        passes = 3
        new_optimizations = true
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = yes

    # Modern smooth bezier curves
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1

    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, default
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 4, smoothIn
    animation = workspaces, 1, 5, default, slidefade 20%
}

dwindle {
    preserve_split = yes
}

master {
    new_status = master
}
